[theme]
base = "dark"
primaryColor = "#2ecc71"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1e1e2e"
textColor = "#f0f0f0"
font = "sans serif"

[server]
maxUploadSize = 5
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
toolbarMode = "minimal"

      "ولا شك في كونه من السابعة"
    ],
    "_raw": "\nأبو محمد التميمي، سهندي (سمندي)، وسمند بلد في أذربيجان، كوفي\n\n--- Page 404 ---\nالتراجم\nالأصل، انتقل إلى أرمينيا، ليس بذاك كما عن النجاشي، ضعيف كما عن ابن\nالغضائري، روى في تفسير القمي.\nيرد بعنوان: الفضيل بن أبي قرة، الفضل بن أبي قرة السمندي الكوفي، الفضل\nبن أبي غرة مصحفاً.\nعدّه في طبقات الكافي والفقيه والتهذيب والنجاشي من الخامسة. هو من\nيروي عنه شريف سابق التفليسي، وهو يروي في أسناده عن أبي عبد الله لطبي، وكان\nالنجاشي قد نص على عدم روايته عن أبي عبد الله لللله، وهو من الخامسة.\n77٨. الفضل بن شاذان بن خليل النيشابوري\nأبو محمد الأزدي، النيشابوري، ذكر العلمان جلالة قدره، وفضله ووثاقته عن\nالنجاشي والكشي، توهم ابن النديم وتخيل أن الفضل بن شاذان في كتبنا هو الفضل\nبن شاذان العامي المشهور عندهم كما بيّناه في الوافي من وضوح تعدد الرجلين.\nيرد بعنوان: أبي محمد الفضل بن شاذان بن خليل، الفضل، الفضل بن شاذان،\nالفضل بن شاذان النيشابوري.\nعدّه في طبقات الكافي والنجاشي والتهذيب من السابعة، وتردد في طبقات\nالفقيه بين صغار السادسة والسابعة، وفي طبقات الكشي عدّ الفضل بن شاذان\nالنيشابوري من السابعة، والفضل بن شاذان من السادسة. والرجل واضح\nالأسناد تروي عنه الثامنة ويروي عن السادسة، وسنة وفاته معلومة، توفي رحمه\nالله سنة (٢٥٩هـ) سنة دخول الصفاريين نيشابور وانتهاء الدولة الطاهرية،\nوذكروا أنه توفي سنة (٢٦٠هـ) والدقيق الأول، ولا شك في كونه من السابعة.\n779. الفضل بن عبد الله النوفلي الهاشمي\nهو الفضل بن عبد الله (ببة) بن الحارث بن نوفل بن الحارث بن عبد المطلب،\n\n--- Page 405 ---\nممجم الألف رجل\n(\nلم يرد فيه توثيق، أكثر من يروي عنه ابنه الثقة المار المسمى عبد الله. أبناؤه: محمد\nوإسهاعيل وإبراهيم وعبد الله وإسحاق ويحيى ممن دخلوا على أبي عبد اللهطليلا\nورووا عنه. وأخوه إسحاق. في اختصاص المفيد رواية مادحة عن طريقه، وفي\nسندها سقط؛ إذ لا تصح رواية ابن أبي عمير عنه.\nيرد بعنوان: الفضل النوفلي، الفضل الهاشمي، الفضل بن عبد الله النوفلي،\nالفضل بن عبد الله الهاشمي، وربها صحف الفضل فكتب فضيل، لا خلاف في\nكونه من <b>الرابعة</b>.\n",
    "_source": "llm_gap_fixer"
  },

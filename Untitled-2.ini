    ],
    "_raw": "\nأبو الحسن الأشعري، قمي القزداني نسبة لقرية، أو القزويني، أو القرداني،\nيلقب: ابن متويه.\nيرد بعنوان: علي بن محمد بن سعد، علي بن محمد بن سعيد مصحفاً، علي بن\nمحمد بن متويه. يروي عن محمد بن سالم الكندي بعنوان محمد بن سالم بن أبي\nسلمة، ويصحف كثيراً بمحمد بن مسلم ومحمد بن أسلم لتشابه كتابة سالم مع\n\n--- Page 374 ---\nالتراجم\nمسلم وأسلم في الخطوط القديمة. قال في طبقات الكافي والنجاشي: «كأنه من\nالسابعة»، وعدّه منها في طبقات الفهرست. وهو من السابعة.\n۲۰۸. علي بن محمد بن سيار\nأبو الحسن الأسترآبادي، هو الذي يروي عنه شيخ الصدوق محمد بن القاسم\nالأسترآبادي الذي ضعفه ابن الغضائري وقال: إنه يروي تفسيرا عن مجهولين\nأحدهما المترجم له ووصف أحاديثه بالمناكير، وهو يروي عن أبيه عن الحسن\nالعسكري لللله، وصفه تلميذه الضعيف بأنه من الشيعة، وفي حكايتهما هو وزميله\nيوسف بن محمد أنهم هربوا من أسترآباد لغلبة الزيدية عليها وهم من الإمامية.\nيرد بعنوان: علي بن محمد في رواية شيخ الصدوق الأسترآبادي، على بن محمد\nبن يسار. استقرب كونه من الثامنة في طبقات الفقيه. وهو من <b>الثامنة</b>.\n",
    "_source": "llm_gap_fixer"
  },

  "796": {
    "num": 796,
    "name_ar": "محمد بن عذافر بن عیسی",
    "tabaqah": 5,
    "tabaqah_detail": "الخامسة",
    "tabaqah_sub": null,
    "alt_names": [
      "محمد بن عذافر",
      "ابن عذافر",
      "عذافر بسقوط الكنية",
      "عذافر الصير في"
    ],
    "_raw": "\nأبو عبد الله القرشي مولى، مدني، معروف في كتب العامة، وثقة عندهم بلا\nخلاف يشار إليه.\nيرد بعنوان: ابن عجلان. روت عنه الخامسة، ولذا فما عن محمد بن سنان\nفبواسطة ساقطة، وعلى كل تقدير سبق وبينا أن لا وثاقة في ملاقاة محمد بن سنان\nلمن يروي عنهم؛ لأنه اعترف بهذا قبل وفاته، وما عن محمد بن أبي عمير عن ابن\nسنان عنه فهو عبد الله بن سنان وليس محمد، وما عن ابن فضال فَيـُـتْـم السند\nموجب للريبة، وأما ما عن عثمان بن عيسي فلا ضير؛ فهو معمر من الخامسة توفي\nمع السادسة كها بيّناه. روى في كامل الزيارات.\nوتوفي سنة (١٤٨هـ)، وهو بلا خلاف كما يبدو من طبقات التهذيب والكافي\nمن <b>الرابعة</b>.\n۷۹۲. محمد بن عذافر بن عیسی\nخزاعي مولى، صيرفي، قيل: كوفي، وقيل: مدائني. وثقه العلمان.\nيرد بعنوان: محمد بن عذافر، ابن عذافر، عذافر بسقوط الكنية، عذافر الصير في\n\n--- Page 474 ---\nالتراجم\nبسقوط الكنية.\nعدّه السيّد البروجردي في طبقات الكافي والفقيه والنجاشي وأسماء التهذيب\nمن الخامسة، وفي كناه من السادسة. والرجل توفي قبل (٢٠٣هـ) وكان عمره\n(٩٣عاماً)، فيمكن أن يكون قد أدرك الباقر لللل وعمر إلى زمن الرضا لللله،\nفالمناسب عدَّه من صغار الرابعة التي أدركتها السادسة، ولكن كثرة روايته عن\nالخامسة تمنع أن يكون سابقاً لهم، فهو على أفضل تقدير ممن ولد مع الخامسة في\nحدود (٠٠١هـ)، وتوفي قرابة (٩٣١هـ)، فهو وإن كان معمراً، لكنه ولد مع كبار\nالخامسة وتوفي مع صغار الخامسة.\n",
    "_source": "llm_gap_fixer"
  },
  "914": {
    "num": 914,
    "name_ar": "موسی بن یسار",
    "tabaqah": 6,
    "tabaqah_detail": "السادسة",
    "tabaqah_sub": null,
    "alt_names": [
      "موسى بن يسار العطار",
      "موسى بن يسار\nالمنقري",
      "موسى بن بشار العطار",
      "موسى بن يسار القطان.\nقال السيّد البروجردي ي طبقات الكافي: «لعله من السادسة»",
      "وتردد بين\nالسادسة والسابعة في طبقات التهذيب. وقد روى عنه مكثرا محمد بن الحسين\nبن أبي الخطاب المتوفى (٢٦٢هـ)",
      "وهو يروي عن المسعودي والذي قال السيّد\nالخوئي قدست نفسه في المعجم أنه على بن الحسين بن على المسعودي صاحب\nمروج الذهب. وهذا سهو ظاهر منه قدست نفسه",
      "فإن على بن الحسين المسعودي\nممن روى عنه مشايخ النجاشي وقد توفي سنة (٤٦هـ) أو على أفضل تقدير سنة\n(٣٣٣هـ)",
      "فهو في طبقة متأخرة جدا عن موسى بن يسار؛ إذ أن المسعودي في\nعداد التاسعة",
      "فكيف يروي عنه موسى الذي تروى عنه السابعة؟ وعليه فها\nذكره في المعجم - في ترجمة موسى بن حسان راوي كتاب المسعودي من احتمال\nكون موسى بن حسان تصحيف والصحيح أنه موسى بن يسار- لا يستقيم.\nوكذا وقع صاحب قاموس الرجال في فخ الطبقة. ولعل موسى بن يسار توفي أو\nحكى روايته لمحمد بن الحسين بن أبي الخطاب عن شيخه المسمى المسعودي –\nذلك الحين – قبل أن يولد المسعودي – صاحب مروج الذهب – حتى . والظاهر\nفي تحديد المسعودي الذي يروي عنه موسى بن يسار",
      "والذي يتواجد في نفس\nالموضع الطبقي في الكافي والذي يعتبر الأشهر بين من يطلق عليه المسعودي\nذلك الحين هو أبو عبد الرحمن المسعودي",
      "وهو عبد الله بن عبد الملك المسعودي.\nوعلى ذلك فموسى بن يسار من السادسة"
    ],
    "_raw": "\nأبو عبد الله البجلي، عربي صميم، كوفي، وثقه العلمان، وكرر النجاشي وزاد:\n«جليل، واضح الحديث، حسن الطريقة». روى في كامل الزيارات.\nيرد بعنوان: موسى، موسى القاسم، موسى بن القاسم، موسى بن القاسم بن\nمعاوية، موسى بن القاسم البجلي، موسى بن القاسم بن معاوية البجلي.\n\n--- Page 539 ---\nممجم الألف رجل\n(037)\nعدّه السيّد البروجردي في طبقات الكافي والكشى والفقيه والفهرست\nوالنجاشي من السابعة، ومن كبار السابعة في طبقات التهذيب. وقد روت عنه\nالسابعة مثل: أحمد بن محمد بن خالد البرقي المتوفى (٢٧٤هـ)، وأحمد بن محمد\nبن عيسى الأشعري المتوفى بعد (٢٧٤هـ)، وأخيه عبد الله الملقب ببنان، وأحمد\nبن هلال المتوفى (٢٦٧هـ)، ومحمد بن الحسين بن أبي الخطاب المتوفى (٢٦٢هـ)،\nوسهل بن زياد، وعلى بن مهزيار وهو من كبار السابعة، ومحمد بن على بن محبوب\nوهو من صغار السابعة كما قدمناه، هذا من ناحية تلامذته، وأما هو فقد روى\nعن السادسة، فأكثر عن صفوان بن يحيى المتوفى (٢١٠هـ) حتى بلغت رواياته\nعنه أكثر من سبعمائة رواية، وأكثر أيضاً عن ابن أبي عمير المتوفى (٢١٧هـ)،\nوعلى بن جعفر(عمر وبقى إلى سنة ٢٥٢ هـ)، ولكنه روى أيضاً عن جملة من\nالخامسة، وبتتبع أكثرهم وجدنا أنه يروي عنهم بواسطة، وتلك الموارد التي روى\nفيها عن الخامسة فيها سقط تجد ما يملأه من الأسناد المتناظرة، فقد روى عن:\nأبي جميلة النخاس، وأبان بن عثمان، وأحمد بن عمر الحلال، وإسماعيل بن جابر\nوحنان بن سدير – فإنهما وإن عمرا، لكن أقصى من أدركهما هم أساتذة موسى\n- وجميل بن دراج، وسيف بن عميرة، وعبد الرحمن بن الحجاج، وعبد الله بن\nسنان، وعلى بن رئاب، ومحمد بن عذافر، ومعاوية بن عهار، ومعاوية بن وهب،\nويونس بن يعقوب، ونحوهم، لكن بمتابعة الأسناد تجد أنه روى عن أبي جميلة\nمثلا بواسطة عمرو بن عثمان، وعن جميل بواسطة ابن أبي عمير، وهكذا في البقية،\nبل تجد في سند أنه روى موسى بن القاسم عن معاوية بن وهب عن صفوان عن\nالعلا، والصحيح بلا ريب، موسى بن القاسم بن معاوية بن وهب عن صفوان\nعن العلا، فإن راوينا هو حفيد معاوية وتلميذ صفوان وجده بمنزلة أساتذة\nصفوان، ولیس تلمیذا له، ولعل هناك سوء انتزاع تعرضت له روایات موسى\nبن القاسم فحدث هذا الخلل والسقط في جملة عظيمة من أسناده، والمحصلة\n\n--- Page 540 ---\nالتراجم\nبها أن الرجل روت عنه السابعة وروى عن السادسة فالمناسب عدَّه من <b>كبار</b>\nالسابعة.\n۹۱۶. موسی بن یسار\nلا يعرف عنه شيء. يرد بعنوان: موسى بن يسار العطار، موسى بن يسار\nالمنقري، موسى بن بشار العطار، موسى بن يسار القطان.\nقال السيّد البروجردي ي طبقات الكافي: «لعله من السادسة»، وتردد بين\nالسادسة والسابعة في طبقات التهذيب. وقد روى عنه مكثرا محمد بن الحسين\nبن أبي الخطاب المتوفى (٢٦٢هـ)، وهو يروي عن المسعودي والذي قال السيّد\nالخوئي قدست نفسه في المعجم أنه على بن الحسين بن على المسعودي صاحب\nمروج الذهب. وهذا سهو ظاهر منه قدست نفسه، فإن على بن الحسين المسعودي\nممن روى عنه مشايخ النجاشي وقد توفي سنة (٤٦هـ) أو على أفضل تقدير سنة\n(٣٣٣هـ)، فهو في طبقة متأخرة جدا عن موسى بن يسار؛ إذ أن المسعودي في\nعداد التاسعة، فكيف يروي عنه موسى الذي تروى عنه السابعة؟ وعليه فها\nذكره في المعجم - في ترجمة موسى بن حسان راوي كتاب المسعودي من احتمال\nكون موسى بن حسان تصحيف والصحيح أنه موسى بن يسار- لا يستقيم.\nوكذا وقع صاحب قاموس الرجال في فخ الطبقة. ولعل موسى بن يسار توفي أو\nحكى روايته لمحمد بن الحسين بن أبي الخطاب عن شيخه المسمى المسعودي –\nذلك الحين – قبل أن يولد المسعودي – صاحب مروج الذهب – حتى . والظاهر\nفي تحد",

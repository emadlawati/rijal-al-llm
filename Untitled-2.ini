  "243": {
    "num": 243,
    "name_ar": "الحسن بن علي بن شعبة",
    "tabaqah": 10,
    "tabaqah_detail": "العاشرة",
    "tabaqah_sub": null,
    "alt_names": [],
    "_raw": "\nلا يعرف عنه شيء. يرد بعنوان: الحسن بن علي في رواية عبد الله بن إسحاق\nعنه. ردد في طبقات الكافي فيه بين السادسة والسابعة. والرجل يروي عنه عبد الله\nبن إسحاق العلوي الذي يعد في السابعة، ويروي هو عن محمد بن عمران الذي\nيعد في الخامسة، ومحمد بن سليهان الذي يعد من السادسة، فلا أقل أن يكون من\nصغار السادسة.\n٧٤٣. الحسن بن علي بن شعبة\nأبو محمد الحراني، الحلبي، فاضل محدّث جليل، مؤلف تحف العقول، كما عن\nالحر. هو أستاذ الشيخ المفيد وهو من الحادية عشرة (٣٣٦ – ١٣ ٤هـ)، وتلميذ\nالشيخ محمد بن همام وهو من التاسعة (٢٥٨ – ٣٣٣هـ)، فها ذكر من تاريخ وفاة\nابن شعبة الحراني وكونها حوالي (٣٣٦هـ) لا يستقيم، إذ كيف روى عنه المفيد\nوهو توفي سنة ولادة المفيد، فالظاهر أنه توفي سنة (٣٨١هـ) على ما ذكر آخرون،\nوهو من <b>العاشرة.</b>\n\n--- Page 180 ---\nالتراجم\n(181)\n",
    "_source": "llm_gap_fixer"
  },
  "245": {
    "num": 245,
    "name_ar": "الحسن بن علي بن زكريا العدوي",
    "tabaqah": 7,
    "tabaqah_detail": "السابعة",
    "tabaqah_sub": null,
    "alt_names": [
      "الحسن بن علي العدوي",
      "الحسن بن علي بن زكريا",
      "الحسين بن على\nبن زكريا مصحفاً. ولدسنة (٢١٠هـ) وعُمِّر عمراً طويلاً وبقي إلى سنة (٣١٨هـ)",
      "فهو معمر يقرب من كبار الثامنة",
      "وتوفي مع صغار التاسعة"
    ],
    "_raw": "\nأبو محمد البجلي، مولى جندب بن عبد الله، كوفي، وثقه النجاشي مكرراً في\nالترجمة الأولى، ثم وثقه وأباه في ترجمة أخرى جعلها تحت عنوان الحسن بن علي\nبن أبي المغيرة، روى في كامل الزيارات.\nيرد بعنوان: أبو محمد بن المغيرة الكوفي، الحسن بن علي، الحسن بن علي بن عبد\nالله، الحسن بن أبي عبد الله بن أبي المغيرة، الحسن بن علي الكوفي، الحسين بن علي\nالكوفي مصحفاً، الحسن بن علي الكرخي مصحفاً.\nعدّه في طبقات النجاشي والكافي والفهرست والتهذيب من السابعة،\nواستقرب تحت عنوان الحسن بن علي بن عبد الله بن المغيرة في طبقات الفهرست\nكونه من السادسة، وهو من <b>السابعة</b>.\n٧٤٥. الحسن بن علي بن زكريا العدوي\nأبو سعيد البزوفري، بصري سكن بغداد، شيخ مشايخ الصدوق، روى في\nكامل الزيارات، وعن ابن الغضائري أنه ضعيف جداً، وأمره أشهر من أن يذكر.\nوصفه العامة بالكذب والوضع وغير ذلك من القدح.\nذكره السيّد البروجردي في طبقات الفقيه وقال: «لم يعلم طبقته»، وتردد في\nطبقات النجاشي بين التاسعة والثامنة، واستقرب كونه من السابعة في طبقات\nالتهذيب.\nيرد بعنوان: الحسن بن علي العدوي، الحسن بن علي بن زكريا، الحسين بن على\nبن زكريا مصحفاً. ولدسنة (٢١٠هـ) وعُمِّر عمراً طويلاً وبقي إلى سنة (٣١٨هـ)،\nفهو معمر يقرب من كبار الثامنة، وتوفي مع صغار التاسعة.\n\n--- Page 181 ---\nمعجم الألف رجل\n(181)\n",
    "_source": "llm_gap_fixer"
  },
  "247": {
    "num": 247,
    "name_ar": "الحسن بن علي بن فضال",
    "tabaqah": 6,
    "tabaqah_detail": "السادسة",
    "tabaqah_sub": null,
    "alt_names": [
      "الحسن",
      "الحسن بن على",
      "الحسن بن فضال",
      "ابن فضال",
      "الحسن\nبن علي بن فضال الكوفي التيملي. وما ورد في سند فيه الحسن بن عروة ابن أخت\nشعيب",
      "فصوابه الحسن عن عروة. توفي سنة (٢٢١هـ) على الأرجح وليس سنة\n(٢٢٤هـ)",
      "لا خلاف في كونه من السادسة"
    ],
    "_raw": "\nأبو محمد الهاشمي العلوي، شيخ الكليني، لم ألحظ أحداً حدده أوعيّنه، إلّا أن\nالمعروف والمشهور في هذه الطبقة من بني هاشم، هو الحسن بن علي العلوي أبو\nمحمد الأطروش، فهو متحد معه في الكنية والاسم واسم والجد والنسب والطبقة،\nوالذي قال فيه النجاشي: «الحسن بن علي بن الحسن بن عمر بن علي بن الحسين بن\nعلى بن أبي طالب الليم البو محمد الأطروش عليه، كان يعتقد الإمامة» وذكر أنه صنف\nكتابين في الإمامة، وكتاباً آخر في أنساب الأئمة ومواليدهم إلى صاحب الأمريك،\nويلاحظ أن الذي يروي عنه الكليني بالإضافة إلى عدم وجود محدّث شهير قريب\nالمكان والزمان يسمى بهذا الاسم غيره، فإن رواياته في الكافي بمضامين عناوين\nكتب الأطروش الحسن بن الحسن بن على العلوي، بل حتى رواية الحسن بن على\nالهاشمي الذي يقوى اتحاده مع المعنون له مع عدم اتحاد من روى عنهم، وإن كانت\nفي باب الصيام إلَّا أنها تتحدث عن التشمت بمقتل الإمام الحسين لطِّيٌّ، وحرمة\nصيام عاشوراء، نعم هناك رواية واحدة في التيمم ولم يصل إلينا أن للأطروش\nكتابا في هذا، فكتبه كانت موزعة بين مواضيع الإمامة ومظلومية بني هاشم،\nوالخمس وفدك والطلاق والشهداء وأبي طالب. ترحم عليه النجاشي، وقال فيه\nالشيخ: «الناصر للحق رضي الله عنه»، وقال أستاذهما السيّد المرتضي: «وأما أبو\nمحمد الناصر الكبير.. فضله في علمه وزهده وفقهه أظهر من الشمس الباهرة، وهو\nالذي نشر الإسلام في الديلم، حتى اهتدوا به بعد الضلالة، وعدلوا به عائدين\nعن الجهالة، وسيرته الجميلة أكثر من أن تحصى وأظهر من أن تخفى»، وما كتاب\nالناصريات للسيّد المرتضى إلّا ما انتزعه من كتاب (فقه الناصر) لجده من جهة أمه\nالسيّد حسن بن على المعروف أيضاً إضافة للأطروش بالناصر، هو ثالث ملوك\nالدولة العلوية بطبرستان، اشتهر بالعدل في الرعية والعلم والأدب، ترك الحكم\nآخر أيامه وبني مدرسة وصار يدرس الفقه والحديث.\n\n--- Page 182 ---\nالتراجم\nيرد بعنوان: الحسن بن علي الهاشمي، الحسن بن علي الدينوري، أبي محمد\nالدينوري، أبي محمد العلوي الدينوري، الحسن بن علي بن الحسن الدينوري\nالعلوي، الحسين بن على العلوي مصحفاً.\nاستقرب في طبقات النجاشي كونه من الثامنة، وعدّ واستقرب عناوينه المختلفة\nفي طبقات الكافي من السابعة، لرواية محمد بن يحيى عنه، وعدَّه منها في طبقات\nالفهرست، ولكنه ممن أكثر عنه الكليني بلا واسطة، والرجل توفي سنة (٣٠٤هـ)\nعن (٧٤ عاماً) وقبره مزار معروف بآمل. وهو من <b>الثامنة</b>.\n٧٤٧. الحسن بن علي بن فضال\nأبو محمد التيمي، مولى تيم الله، كوفي، فطحى عدل عن مذهبه، وصفه ابن\nمسعود بأنه من أجلة الفقهاء العلماء، وقال الشيخ: كان جليل القدر، عظيم المنزلة،\nزاهداً، ورعاً، ثقة، وذكر النجاشي عن الفضل بن شاذان شدة تنسكه وعبادته\nوعلو منزلته، روى في كامل الزيارات والتفسير، وردد في كونه أحد أصحاب\nالإجماع، قال ابن النديم: «كان من خاصة أصحاب أبي الحسن الرضاطيي».\nيرد بعنوان: الحسن، الحسن بن على، الحسن بن فضال، ابن فضال، الحسن\nبن علي بن فضال الكوفي التيملي. وما ورد في سند فيه الحسن بن عروة ابن أخت\nشعيب، فصوابه الحسن عن عروة. توفي سنة (٢٢١هـ) على الأرجح وليس سنة\n(٢٢٤هـ)، لا خلاف في كونه من <b>السادسة</b>.\n",
    "_source": "llm_gap_fixer"
  },
  "249": {
    "num": 249,
    "name_ar": "الحسن بن علي بن النعمان",
    "tabaqah": 6,
    "tabaqah_detail": "السادسة",
    "tabaqah_sub": null,
    "alt_names": [],
    "_raw": "\nأهوازي، لم يوثق صريحاً، ورد اسمه في التفسير وكامل الزيارات.\nيرد بعنوان: الحسن، الحسن بن علي. استقرب في طبقات النجاشي كونه من\nالثامنة، وعدّه من كبارها في طبقات التهذيب.\n\n--- Page 183 ---\nممجم الألف رجل\n(188)\nيروي عنه ابنه محمد، ومحمد بن أحمد العسكري وعلي بن حاتم من التاسعة.\nوسعد وأبو علي الأشعري من الثامنة، ويروي عن أبيه الثقة المعروف من كبار\nالسابعة. وأما رواية علي بن إبراهيم عنه في التفسير فلا تتناسب مع كون الرواية\nلعلي، ولعلها من أسناد تفسير السياري وليس القمي، فهو يقع في طريقه إلى\nالسياري في نفس الرواية، وعلى كل تقدير يظهر أنه من <b>كبار الثامنة</b>.\n٧٤٩. الحسن بن علي بن النعمان\nمولى بني هاشم، كوفي، ابن علي بن النعمان الأعلم المعروف، ثقة ثبت له كتاب\nصحيح الأحاديث كها عن النجاشي.\nعده في طبقات التهذيب من السادسة، وعده في طبقات الكافي والفقيه والكشي\nمن السابعة، واستقرب ذلك في طبقات الفهرست، لكن رواية بعض السابعة عنه\nترجح كونه من كبار السابعة.\n",
    "_source": "llm_gap_fixer"
  },

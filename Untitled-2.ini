    "_raw": "\nأبو حيان ال.تيمي، كوفي، وصفه العامة بالوثاقة والصلاح والصدق، وذكروا\nأنه توفي سنة (١٤٥ هـ)، يرد في أسناد التوحيد.\nيرد بعنوان: أبي حيان التيمي، يحيى بن سعيد. من <b>الرابعة</b>.\n97٧. يحيى بن سعيد القطان\nأبو زكريا كها عن النجاشي. يحيي بن سعيد بن فروخ القطان، أبو سعيد\nالبصري، كما عن الشيخ، عامي، وفي تاريخ بغداد: «أبو سعيد القطان الأحول،\nمولى بني تميم». قال فيه النجاشي: «عامي، ثقة». وقال الشيخ: «كان من أئمة\nالحديث»، ووثقه العامة وأثنوا عليه ووصفوه بالتثبت.\nيرد بعنوان: يحيى بن سعيد. عدّه في طبقات النجاشي من الخامسة. ولد سنة\n(١٢٠هـ) وتوفي سنة (١٩٨هـ)، فهو من <b>الخامسة</b>.\n",

      "وعدّه من السابعة\nفي عنوان آخر من طبقات التهذيب",
      "واستقرب أن يكون منها في طبقات الفقيه.\nولكن الأقرب كونه من صغار السادسة"
    ],
    "_raw": "\nمولى بني زهرة بن كلاب، كوفي، وثقه العلمان، روى عنه محمد بن أبي عمير\n\n--- Page 253 ---\nممجم الألف رجل\nوصفوان والبزنطي. يرد بعنوان: سعد بن أبي خلف، سعد بن أبي خلف الزاجر،\nسعد إلزام.\nقد يتوهم روايته عن الباقر طليه، لكنه ليس بالمباشرة. قال في طبقات الكافي:\nكأنه من الخامسة، وعدَّه منها في طبقات النجاشي والتهذيب والفهرست، وعدَّه\nمن صغارها في طبقات الفقيه. وهو من <b>الخامسة</b>.\n۲۸۰. سعد بن إسهاعيل\nهو راو لا يعرف عنه شيء، ويرد في تسلسل سندي واحد، فالراوي عنه في جميع\nالروايات هو أحمد بن محمد بن عيسى الأشعري، وهو يروي في جميع الروايات\nعن أبيه عن الرضاطيل، ولا مدرك لتوثيقه سوى رواية أحمد عنه.\nيرد بعنوان: سعد بن إسماعيل الأحوص، سعد بن إسماعيل بن الأحوص،\nسعد بن إسهاعيل بن عيسى. وهو بحسب النظر في شجرة الأشعريين؛ فإن\nكان منهم فيحتمل إذا كان جده عيسى أن يكون ابن عم أحمد الأشعري، أو أنه\nابن الراوي المعروف إسهاعيل بن سعد الأحوص، أو أن الاسم مقلوب في كل\nهذا التسلسل السندي، وأن الصحيح هو إسهاعيل بن سعد بن الأحوص الثقة\nالمعروف أخو سعد القادم.\nتردد في طبقات الكافي والتهذيب بين السادسة والسابعة، وعدّه من السابعة\nفي عنوان آخر من طبقات التهذيب، واستقرب أن يكون منها في طبقات الفقيه.\nولكن الأقرب كونه من <b>صغار السادسة</b>.\n",
    "_source": "llm_gap_fixer"
  },

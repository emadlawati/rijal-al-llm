      "فهو معمر من كبار الرابعة توفي مع\nالخامسة.\n(١) الوافي في تحقيق أسناد كتاب الكافي ٣: ٦٨ - ٦٩"
    ],
    "_raw": "\nأبو عبد الله، ذكروه ولم يوثق، ذكرنا نتفا من النكت في الرجل في الوافي<sup>(١)</sup>\nوملخص حاله أنه مجهول.\nيرد بعنوان: الفتح بن يزيد. قال السيّد البروجردي في طبقات الكافي: «لعله\nمن السادسة أو السابعة»، واستقرب كونه من الخامسة في طبقات التهذيب، في\nحين استقرب كونه من السادسة في طبقات الفهرست. وهو من صغار السادسة.\n370. فرات بن الأحنف العبدي\nأبو محمد العبدي أو الهلالي، كوفي، عن ابن الغضائري: «لا يرتفع به ولا بذكره،\nغال كذاب». وضعفه أيضاً في ترجمة ابنه محمد، وقال: «ضعيف ابن ضعيف».\nوقال الشيخ: «يرمى بالغلو والتفريط بالقول». ونقل قول العقيقي في الخلاصة:\nإنه كان زاهدا رافضا للدنيا، ثم قال عن بعض مشايخه من أهل الكوفة إنه كان\nيقول: إن في محمد شيئا من القديم.\nيرد بعنوان: فرات بن أحنف. ذكر أهل الرجال كابن الغضائري والشيخ أنه بمن\nعاصر السجاد والباقر والصادق للله، وهو مؤيد بالأسناد، وكل ما يرد من رواية\nغير السادسة عنه ففيه سقط، بل حتى روايات ابن سنان عنه غير موثوق بملاقاته\nله، فالرجل وفق أسناده ممن ولد في حدود (٧٠ هـ)، وتوفي قرابة (١٦٧هـ) أو\nحتى ربها أقل من ذلك.\nعده في طبقات الكشي من الرابعة، وقال في طبقات الكافي: «كأنه من الخامسة»،\nولكن الصحيح أنه إن لم يكن من الثالثة، فهو معمر <b>من كبار الرابعة توفي مع</b>\nالخامسة.\n(١) الوافي في تحقيق أسناد كتاب الكافي ٣: ٦٨ - ٦٩.\n\n--- Page 403 ---\nممجم الألف رجل\n(£•Y)\n",
    "_source": "llm_gap_fixer"
  },

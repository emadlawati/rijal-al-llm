    "alt_names": [
      "أبي محمد الفضل بن شاذان بن خليل",
      "الفضل",
      "الفضل بن شاذان",
      "الفضل بن شاذان النيشابوري.\nعدّه في طبقات الكافي والنجاشي والتهذيب من السابعة",
      "وتردد في طبقات\nالفقيه بين صغار السادسة والسابعة",
      "وفي طبقات الكشي عدّ الفضل بن شاذان\nالنيشابوري من السابعة",
      "والفضل بن شاذان من السادسة. والرجل واضح\nالأسناد تروي عنه الثامنة ويروي عن السادسة",
      "وسنة وفاته معلومة",
      "توفي رحمه\nالله سنة (٢٥٩هـ) سنة دخول الصفاريين نيشابور وانتهاء الدولة الطاهرية",

    "_raw": "\nأبو سعيد الأنصاري المديني، القاضي، عامي، وثقه العامة وأثنوا عليه. «من\nفقهاء أهل المدينة ومتقنيهم» كما عن ابن حبان. قال الخطيب: «كان يتولى القضاء\n\n--- Page 569 ---\nممجم الألف رجل\nبمدينة رسول الله عليه المنصور العراق، وولاه القضاء بالهاشمية، وذكر غير\nواحد من أهل العلم أنه ولى القضاء بمدينة السلام وليس ذلك ثابتاً عندي، إنها\nوليه بالهاشمية قبل أن تبنى بغداد»، وكلامه موافق للصواب؛ فإنه توفي قبل أن\nتبنى دار السلام.\nيرد بعنوان: يحيى بن سعيد، يحيى بن سعيد بن المسيب، وهو مصحف عن يحيى\nبن سعيد عن سعيد بن المسيب. توفي سنة (١٤٤هـ) أو قبلها بسنة في الهاشمية\nبالعراق. وهو من <b>الرابعة</b>.\n979. يحيى بن سُـليم\nأبو البلاد الغطفاني السلمي، مولى غطفان، المقرئ، وثقه ابن معين في العامة.\nوعن آخرين أنه يكتب حديثه. قيل: يحيى بن سليهان، كوفي، مرَّ في الكتاب ترجمة\nولده إبراهيم بن أبي البلاد وحفيده يحيى، ويروي الحفيد عن أبيه عن جده. قال\nالنجاشي: «كان أبو البلاد ضريراً، وكان راوية الشعر وله يقول الفرزدق: يا لهف\nنفسي على عينيك من رجل، وروى عن أبي جعفر وأبي عبد الله ﴿ اللَّهُ ۗ اللَّهُ اللَّهُ اللَّهُ اللَّهُ ال\nمع أبان بن تغلب تلفظ بها ببعض القبيح.\nيرد بعنوان: أبو البلاد، يحيى بن سليهان، يحيى بن أبي سليهان الغطفاني. وهناك\nراو آخر اسمه يحيى بن سليم الطائفي، وثقه العامة وتوفي سنة (١٧٨هـ) من\nالخامسة، وأما المترجم له فعدّه في طبقات الكافي والتهذيب من الرابعة، ومن\nالخامسة في طبقات الكشي، وهو من <b>الرابعة</b>.\n",
